name: ci

on:
  pull_request:
  push:
    branches: [main]

# Two subprojects, two images. Each app is typechecked and tested; each image is scanned for
# HIGH/CRITICAL vulnerabilities with Trivy — the same security gate as rs-mcp-server.
jobs:
  home:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-home
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portfolio-home/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  auth:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platform-auth/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  scan-home:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the home image
        run: docker build --pull -t scan-home:ci portfolio-home
      - name: Trivy scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: scan-home:ci
          severity: HIGH,CRITICAL
          exit-code: "1" # blocking: images are hardened to 0 HIGH/CRITICAL
          ignore-unfixed: true

  scan-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the auth image
        run: docker build --pull -t scan-auth:ci platform-auth
      - name: Trivy scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: scan-auth:ci
          severity: HIGH,CRITICAL
          exit-code: "1" # blocking: images are hardened to 0 HIGH/CRITICAL
          ignore-unfixed: true

  dep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Source-level scan: the built images are minimal (bundled or prod-only), so a Trivy fs scan of
      # the lockfiles is what catches a vulnerable DEPENDENCY before it is shipped — the coverage an
      # image scan of a bundled app cannot give.
      - name: Trivy dependency scan (lockfiles)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
