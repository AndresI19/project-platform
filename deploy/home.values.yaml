# Deploy values for home — the Kubernetes Deployment/Service spec for this service. It is consumed at
# deploy time by platform-orchestration's generic `service` chart:
#   helm upgrade home <orchestration>/charts/service -n platform -f deploy/home.values.yaml \
#     --set image.repo=registry:5000/home --set image.tag=<version> --set version=<version>
# The shared boilerplate (securityContext, /tmp mount, labels, probe rendering) lives in the chart's
# platform.app helper; only what varies for this service is here. Image repo/tag + version are set per
# deploy by CI. Keep the `name` field == the Service DNS name the router and sibling services expect.
name: home
image:
  repo: platform-home
  tag: latest
version: 0.0.0
port: 3000
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 256Mi
probe:
  path: /api/health
  initialDelaySeconds: 3
env:
  - name: PORT
    value: '3000'
  - name: VMCP_API_BASE
    valueFrom:
      configMapKeyRef:
        name: platform-config
        key: VMCP_API_BASE
  - name: DISCORD_WEBHOOK_URL
    valueFrom:
      secretKeyRef:
        name: platform-secrets
        key: DISCORD_WEBHOOK_URL
        optional: true
initContainers:
  - name: seed-resume
    command:
      - sh
      - '-c'
      - cp -n /app/dist/client/resume.pdf /content/resume.pdf || true; ls -l /content/resume.pdf
    volumeMounts:
      - name: content
        mountPath: /content
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
volumeMounts:
  - name: content
    mountPath: /app/dist/client/resume.pdf
    subPath: resume.pdf
    readOnly: true
  - name: content
    mountPath: /content
    readOnly: true
volumes:
  - name: content
    persistentVolumeClaim:
      claimName: platform-content
